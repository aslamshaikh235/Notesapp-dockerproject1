apiVersion: apps/v1
kind: Deployment

metadata:
  name: notes-app-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: notes-app

  template:
    metadata:
      labels:
        app: notes-app

    spec:
      containers:
      - name: notes-app
        image: 533196843357.dkr.ecr.us-east-1.amazonaws.com/notes-app:latest

        ports:
        - containerPort: 8000
